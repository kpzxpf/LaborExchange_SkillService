server:
  port: 8086

spring:
  application:
    name: skill-service

  datasource:
    url: jdbc:postgresql://localhost:5435/skilldb
    username: skilluser
    password: skillpass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration